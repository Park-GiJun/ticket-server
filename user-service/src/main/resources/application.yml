server:
  port: 8081

spring:
  application:
    name: user-service

  # === Datasource (dev: H2, PostgreSQL 호환 모드) ===
  datasource:
    url: jdbc:h2:mem:user;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""

  # === JPA / Hibernate ===
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # === Redis (비밀번호 재설정 토큰 저장) ===
  data:
    redis:
      host: localhost
      port: 6379

  # === Kafka (사용자 이벤트 발행) ===
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 3000

# === Service Discovery ===
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# === JWT ===
jwt:
  secret: ticket-server-dev-secret-please-change-in-production-0123456789abcdef
  access-token-expiration-millis: 3600000
  issuer: ticket-server
