server:
  port: 18081

spring:
  application:
    name: user-service

  # === Datasource (환경변수 주입. 기본값은 로컬 dev. 운영 자격증명은 절대 커밋 금지) ===
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketserver}
    username: ${DB_USERNAME:ticketserver}
    password: ${DB_PASSWORD:ticketserver}
    driver-class-name: org.postgresql.Driver

  # === JPA / Hibernate ===
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # === Redis (비밀번호 재설정 토큰 저장) ===
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # === Kafka (사용자 이벤트 발행) ===
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 3000

# === Service Discovery ===
eureka:
  client:
    service-url:
      defaultZone: http://localhost:18761/eureka/

# === JWT (운영에서는 JWT_SECRET 환경변수로 반드시 교체. gateway 와 동일해야 한다) ===
jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-please-override-via-env-0123456789abcdef}
  access-token-expiration-millis: ${JWT_ACCESS_TOKEN_EXPIRATION_MILLIS:3600000}
  issuer: ${JWT_ISSUER:ticket-server}
