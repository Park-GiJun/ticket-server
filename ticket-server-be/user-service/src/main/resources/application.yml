server:
  port: 18081

spring:
  application:
    name: user-service

  # === Datasource (공용 서버 인프라: infra-postgres 의 ticketserver DB) ===
  datasource:
    url: jdbc:postgresql://210.121.177.150:5432/ticketserver
    username: ticketserver
    password: ts_8dd5abacbee74fd0a6c4a5f57a3bd691
    driver-class-name: org.postgresql.Driver

  # === JPA / Hibernate ===
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # === Redis (공용 infra-redis, 비밀번호 재설정 토큰 저장) ===
  data:
    redis:
      host: 210.121.177.150
      port: 6380
      password: stocksim123

  # === Kafka (공용 infra-kafka, 사용자 이벤트 발행) ===
  kafka:
    bootstrap-servers: 210.121.177.150:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 3000

# === Service Discovery ===
eureka:
  client:
    service-url:
      defaultZone: http://localhost:18761/eureka/

# === JWT ===
jwt:
  secret: ticket-server-dev-secret-please-change-in-production-0123456789abcdef
  access-token-expiration-millis: 3600000
  issuer: ticket-server
