server:
  port: 18083

spring:
  application:
    name: reservation-service

  # === Datasource (환경변수 주입. 기본값은 로컬 dev. 운영 자격증명은 절대 커밋 금지) ===
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketserver}
    username: ${DB_USERNAME:ticketserver}
    password: ${DB_PASSWORD:ticketserver}
    driver-class-name: org.postgresql.Driver

  # === JPA / Hibernate ===
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# === Service Discovery ===
eureka:
  client:
    service-url:
      defaultZone: http://localhost:18761/eureka/
