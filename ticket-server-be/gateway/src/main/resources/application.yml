server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          # Eureka 서비스 ID(lb://) 로 라우팅. 인증(JWT 검증)은 후속 단계에서 글로벌 필터로 추가한다.
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**,/api/users/**
            - id: ticket-event-service
              uri: lb://TICKET-EVENT-SERVICE
              predicates:
                - Path=/api/ticket-events/**
            - id: reservation-service
              uri: lb://RESERVATION-SERVICE
              predicates:
                - Path=/api/reservations/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# === JWT (검증 전용) — 발급 측 user-service 와 동일해야 한다 ===
jwt:
  secret: ticket-server-dev-secret-please-change-in-production-0123456789abcdef
  issuer: ticket-server
