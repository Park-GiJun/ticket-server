spring:
  application:
    name: ticket-event-service

  # === Datasource (test: H2, PostgreSQL 호환 모드) ===
  datasource:
    url: jdbc:h2:mem:ticketevent;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  # === JPA / Hibernate ===
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# === Service Discovery (테스트에서는 비활성화) ===
eureka:
  client:
    enabled: false
