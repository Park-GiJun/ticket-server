server:
  port: 8082

spring:
  application:
    name: ticket-event-service

  # === Datasource (Docker PostgreSQL: infra/compose.yaml) ===
  datasource:
    url: jdbc:postgresql://localhost:5432/ticket
    username: ticket
    password: secret
    driver-class-name: org.postgresql.Driver

  # === JPA / Hibernate ===
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# === Service Discovery ===
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
