spring:
  application:
    name: ticket-server

  # === Datasource (dev: H2, PostgreSQL 호환 모드) ===
  datasource:
    url: jdbc:h2:mem:ticket;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""

  # === JPA / Hibernate ===
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # === Flyway (dev 에서는 ddl-auto 사용, 운영 전환 시 활성화) ===
  flyway:
    enabled: false

  # === Redis (비밀번호 재설정 토큰 저장) ===
  data:
    redis:
      host: localhost
      port: 6379

  # === Kafka ===
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        # 브로커 미가동 시 발행이 오래 블로킹되지 않도록 제한
        max.block.ms: 3000

# === JWT ===
jwt:
  secret: ticket-server-dev-secret-please-change-in-production-0123456789abcdef
  access-token-expiration-millis: 3600000
  issuer: ticket-server
